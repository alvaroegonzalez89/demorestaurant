<style>
  :root{
    --bg:#1E2A22; --bg2:#16201A; --lineas:#2E3D32;
    --texto:#F4F1E4; --texto-dim:#B9C2B7;
    --papel:#F7F1E1; --papel2:#EFE6CE; --tinta:#2B2118; --tinta-dim:#6B6152;
    --acento:#D9A441; --acento-o:#B8842E; --alerta:#8A3636; --alerta-o:#6E2828; --exito:#6B8F71; --banda2:#B9AC8A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);
    min-height:100vh; padding-bottom:110px;}
  header.top{padding:26px 20px 16px; text-align:center; position:relative;}
  .steam-wrap{position:relative; width:46px; height:34px; margin:0 auto 4px;}
  .steam{position:absolute; bottom:14px; width:4px; height:16px; border-radius:4px; background:var(--acento); opacity:.75;
    animation:steamRise 2.6s ease-in-out infinite;}
  .steam:nth-child(1){left:10px; animation-delay:0s;}
  .steam:nth-child(2){left:20px; animation-delay:.6s;}
  .steam:nth-child(3){left:30px; animation-delay:1.2s;}
  @keyframes steamRise{
    0%{ transform:translateY(0) scaleX(1); opacity:0; }
    20%{ opacity:.8; }
    100%{ transform:translateY(-26px) scaleX(1.6); opacity:0; }
  }
  .cup{font-size:1.6rem; line-height:1;}
  .brand{font-family:'Playball',cursive; font-size:2.5rem; font-weight:400; color:var(--acento); line-height:1;}
  .brand small{display:block; font-family:'DM Sans'; font-size:.65rem; letter-spacing:.16em; color:var(--texto-dim); text-transform:uppercase; margin-top:2px;}
  .mesa-badge{display:inline-flex; align-items:center; gap:8px; margin-top:12px; background:var(--alerta);
    color:var(--papel); font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:.08em;
    padding:8px 18px; border-radius:999px; font-size:.95rem; box-shadow:0 4px 14px rgba(0,0,0,.35);}
  .mesa-edit{background:none;border:none;color:var(--texto);opacity:.6;cursor:pointer;font-size:.78rem;text-decoration:underline;margin-top:6px;}

  .cats{display:flex; gap:8px; overflow-x:auto; padding:6px 16px 14px; scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat-btn{flex:0 0 auto; padding:9px 15px; border-radius:999px; border:1px solid var(--lineas);
    background:var(--bg2); color:var(--texto-dim); font-family:'DM Sans'; font-weight:600;
    font-size:.82rem; cursor:pointer; white-space:nowrap; transition:.15s;}
  .cat-btn.active{background:var(--acento); color:var(--tinta); border-color:var(--acento);}

  main{padding:4px 16px 20px; max-width:640px; margin:0 auto;}

  .sec-banner{margin:20px 0 10px; padding:9px 16px; border-radius:8px; font-family:'Poppins',sans-serif;
    font-weight:700; font-size:.92rem; letter-spacing:.03em; text-transform:uppercase; color:#fff;
    display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .sec-banner .nota{font-family:'DM Sans'; font-weight:400; font-size:.7rem; text-transform:none; opacity:.9; letter-spacing:0;}

  .item{background:var(--papel); color:var(--tinta); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px;
    display:flex; justify-content:space-between; gap:12px; box-shadow:0 6px 16px rgba(0,0,0,.22);
    border:1px solid var(--papel2);}
  .item-info{flex:1;}
  .item-name{font-weight:700; font-size:.98rem;}
  .item-desc{color:var(--tinta-dim); font-size:.8rem; margin-top:3px; line-height:1.4;}
  .item-price{font-weight:700; color:var(--acento-o); margin-top:8px; font-size:.92rem;}

  .qty-box{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; min-width:78px;}
  .qty-stepper{display:flex; align-items:center; gap:0; background:var(--papel2); border-radius:999px; overflow:hidden;}
  .qty-stepper button{width:30px; height:30px; border:none; background:none; font-size:1.1rem; font-weight:700; color:var(--tinta); cursor:pointer;}
  .qty-stepper span{min-width:20px; text-align:center; font-weight:700;}
  .add-btn{background:var(--acento); border:none; color:var(--tinta); font-weight:700; font-size:.76rem;
    padding:8px 12px; border-radius:999px; cursor:pointer;}
  .variant-row{display:flex; flex-direction:column; gap:6px; align-items:flex-end;}
  .variant-row .add-btn{width:100%; text-align:center;}

  .info-box{background:var(--papel2); color:var(--tinta); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px; font-size:.85rem; line-height:1.7;}
  .info-box b{color:var(--acento-o);}

  .cart-bar{position:fixed; left:16px; right:16px; bottom:16px; background:var(--acento); color:var(--tinta);
    border-radius:16px; padding:14px 18px; display:none; align-items:center; justify-content:space-between;
    box-shadow:0 10px 30px rgba(0,0,0,.4); cursor:pointer; z-index:40; max-width:608px; margin:0 auto;}
  .cart-bar.show{display:flex;}
  .cart-bar .left{display:flex; flex-direction:column;}
  .cart-bar .count{font-size:.72rem; font-weight:700; opacity:.75;}
  .cart-bar .total{font-weight:700; font-size:1.15rem;}
  .cart-bar .cta{background:var(--tinta); color:var(--papel); padding:9px 16px; border-radius:999px; font-weight:700; font-size:.85rem;}

  .mozo-fab{position:fixed; right:16px; bottom:86px; background:var(--alerta); color:var(--papel);
    border:none; width:56px; height:56px; border-radius:50%; font-size:1.4rem; box-shadow:0 8px 22px rgba(0,0,0,.4);
    cursor:pointer; z-index:41; display:flex; align-items:center; justify-content:center;}
  .cart-bar.show ~ .mozo-fab{bottom:96px;}

  .overlay{position:fixed; inset:0; background:rgba(10,14,11,.6); display:none; align-items:flex-end; z-index:50;}
  .overlay.show{display:flex;}
  .sheet{background:var(--papel); color:var(--tinta); width:100%; max-height:85vh; border-radius:20px 20px 0 0;
    padding:20px; overflow-y:auto; animation:up .25s ease;}
  @keyframes up{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet h3{font-family:'Playball',cursive; font-size:1.9rem; font-weight:400; color:var(--alerta-o); margin:0 0 12px;}
  .close-x{position:absolute; top:16px; right:20px; background:none; border:none; font-size:1.4rem; color:var(--tinta-dim); cursor:pointer;}
  .cart-line{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--papel2);}
  .cart-line .nm{font-weight:600; font-size:.9rem;}
  .cart-line .sub{font-size:.85rem; color:var(--tinta-dim);}
  .cart-total-row{display:flex; justify-content:space-between; padding:16px 0 6px; font-weight:700; font-size:1.1rem;}
  .send-btn{width:100%; background:var(--alerta); color:var(--papel); border:none; padding:15px; border-radius:999px;
    font-weight:700; font-size:1rem; margin-top:10px; cursor:pointer;}
  .send-btn:disabled{opacity:.4;}
  .empty-note{color:var(--tinta-dim); text-align:center; padding:30px 0; font-size:.9rem;}

  .motivo-btn{display:block; width:100%; text-align:left; background:var(--papel2); border:none; padding:14px 16px;
    border-radius:12px; margin-bottom:8px; font-weight:600; color:var(--tinta); cursor:pointer; font-size:.9rem;}
  .motivo-btn:active{background:#E3D8B8;}

  .status-screen{max-width:520px; margin:30px auto; padding:0 16px;}
  .ticket{background:var(--papel); color:var(--tinta); border-radius:16px; padding:22px; box-shadow:0 10px 26px rgba(0,0,0,.3);}
  .ticket h2{font-family:'Playball',cursive; font-weight:400; color:var(--alerta-o); font-size:1.9rem; margin:0 0 4px;}
  .steps{display:flex; align-items:center; margin:20px 0;}
  .step{flex:1; text-align:center; position:relative;}
  .dot{width:26px; height:26px; border-radius:50%; background:var(--papel2); border:2px solid var(--tinta-dim);
    margin:0 auto 6px; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; color:var(--tinta-dim);}
  .step.done .dot{background:var(--exito); border-color:var(--exito); color:#fff;}
  .step.active .dot{background:var(--acento); border-color:var(--acento-o); color:var(--tinta);}
  .step .lbl{font-size:.68rem; font-weight:600; color:var(--tinta-dim);}
  .step-line{position:absolute; top:13px; left:-50%; width:100%; height:2px; background:var(--papel2); z-index:-1;}
  .step.done .step-line{background:var(--exito);}
  .step:first-child .step-line{display:none;}
  .toast{position:fixed; top:16px; left:50%; transform:translateX(-50%); background:var(--exito); color:#fff;
    padding:10px 18px; border-radius:999px; font-weight:600; font-size:.85rem; z-index:99; box-shadow:0 6px 16px rgba(0,0,0,.3);
    opacity:0; transition:.25s;}
  .toast.show{opacity:1;}
  .back-link{display:block; text-align:center; margin-top:16px; color:var(--texto-dim); font-size:.85rem; text-decoration:none;}
  .field-label{font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--tinta-dim); margin:14px 0 6px;}
  .mesa-input-field{width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--papel2); font-size:1rem; font-family:'DM Sans'; background:#fff; color:var(--tinta);}
</style>
</head>

  <div><button class="mesa-edit" id="mesaEditBtn">cambiar mesa</button></div>
</header>

  <nav class="cats" id="cats"></nav>
  <main id="menuMain"></main>
</div>

<div id="statusView" class="status-screen" style="display:none;"></div>

<div class="cart-bar" id="cartBar">
  <div class="left">
    <span class="count" id="cartCount">0 items</span>
    <span class="total" id="cartTotal">$0</span>
  </div>
  <span class="cta">Ver pedido</span>
</div>

<button class="mozo-fab" id="mozoFab" title="Llamar al mozo">🖐️</button>

<div class="overlay" id="cartOverlay">
  <div class="sheet" style="position:relative;">
    <button class="close-x" id="closeCart">✕</button>

  </div>
</div>

<div class="overlay" id="mozoOverlay">

    <button class="close-x" id="closeMozo">✕</button>
    <h3>¿En qué te ayudamos?</h3>

    <button class="motivo-btn" data-m="Consulta vegana">🌱 Consulta vegana</button>
    <button class="motivo-btn" data-m="Pedir la cuenta">🧾 Pedir la cuenta</button>

  </div>
</div>

<div class="overlay" id="onboardOverlay" style="align-items:center;">
  <div class="sheet" style="border-radius:20px; max-width:420px; margin:0 16px; position:relative; width:calc(100% - 32px);">
    <h3>¡Bienvenido!</h3>

    <input class="mesa-input-field" id="inputMesa" placeholder="Ej: 5" inputmode="numeric">
    <div class="field-label">¿A nombre de quién dejamos el pedido?</div>
    <input class="mesa-input-field" id="inputCliente" placeholder="Ej: Juan">
    <button class="send-btn" id="confirmOnboard" style="margin-top:16px;">Ver la carta</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// mapa id -> {nombre, precio} generado a partir de la estructura anidada
function buildLookup(){
  const map = {};
  MENU.forEach((catObj,ci)=>{
    catObj.secciones.forEach((sec,si)=>{
      if(sec.info) return;
      sec.items.forEach((it,ii)=>{
        if(it.ps!=null){
          map[`${ci}-${si}-${ii}-s`] = {nombre: it.n+' (Simple)', precio: it.ps};
          map[`${ci}-${si}-${ii}-e`] = {nombre: it.n+' (Extra)', precio: it.pe};
        } else {
          map[`${ci}-${si}-${ii}`] = {nombre: it.n, precio: it.p};
        }
      });
    });
  });
  return map;
}
const LOOKUP = buildLookup();

// ---- estado / mesa (sin usar prompt(), que muchos navegadores embebidos bloquean) ----
const params = new URLSearchParams(location.search);
let mesa = params.get('mesa') || localStorage.getItem(SK('mesa_actual')) || '';
let cliente = localStorage.getItem(SK('cliente_actual')) || '';

function actualizarBadge(){
  document.getElementById('mesaBadge').textContent = mesa ? ('MESA ' + mesa + (cliente?(' · '+cliente):'')) : 'MESA —';
}
function showOnboard(){
  document.getElementById('inputMesa').value = mesa;
  document.getElementById('inputCliente').value = cliente;
  document.getElementById('onboardOverlay').classList.add('show');
  setTimeout(()=> document.getElementById(mesa?'inputCliente':'inputMesa').focus(), 100);
}
document.getElementById('confirmOnboard').onclick = ()=>{
  const m = document.getElementById('inputMesa').value.trim();
  const c = document.getElementById('inputCliente').value.trim();
  if(!m){ document.getElementById('inputMesa').focus(); return; }
  mesa = m; cliente = c || 'Sin nombre';
  localStorage.setItem(SK('mesa_actual'), mesa);
  localStorage.setItem(SK('cliente_actual'), cliente);
  actualizarBadge();
  document.getElementById('onboardOverlay').classList.remove('show');
  renderStatusIfPending();
};

actualizarBadge();
if(!mesa || !cliente){ showOnboard(); }

document.getElementById('mesaEditBtn').onclick = ()=>{
  showOnboard();
};

let cart = {}; // id -> qty

function renderCats(){
  const cats = document.getElementById('cats');
  cats.innerHTML = CATS.map((c,i)=>`<button class="cat-btn ${i===0?'active':''}" data-idx="${i}">${c}</button>`).join('');
  cats.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.onclick = ()=>{
      cats.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderCategoria(parseInt(btn.dataset.idx));
    };
  });
}

function itemRow(id, nombre, desc, precio){
  const cantidad = cart[id]||0;
  return `<div class="item">
    <div class="item-info">
      <div class="item-name">${nombre}</div>
      ${desc?`<div class="item-desc">${desc}</div>`:''}
      <div class="item-price">${fmt(precio)}</div>
    </div>
    <div class="qty-box">
      ${cantidad ? `<div class="qty-stepper">
          <button class="dec" data-id="${id}">−</button>
          <span>${cantidad}</span>
          <button class="inc" data-id="${id}">+</button>
        </div>` : `<button class="add-btn" data-id="${id}">Agregar</button>`}
    </div>
  </div>`;
}

function renderCategoria(ci){
  const catObj = MENU[ci];
  const main = document.getElementById('menuMain');
  let html = '';
  catObj.secciones.forEach((sec,si)=>{
    const bandaColor = si%2===0 ? 'var(--acento-o)' : 'var(--banda2)';
    html += `<div class="sec-banner" style="background:${bandaColor};">
      <span>${sec.titulo}</span>${sec.nota?`<span class="nota">${sec.nota}</span>`:''}
    </div>`;
    if(sec.info){
      html += `<div class="info-box">${sec.items.map(t=>`• ${t}`).join('<br>')}</div>`;
      return;
    }
    sec.items.forEach((it,ii)=>{
      if(it.ps!=null){
        const idS = `${ci}-${si}-${ii}-s`, idE = `${ci}-${si}-${ii}-e`;
        const qS = cart[idS]||0, qE = cart[idE]||0;
        html += `<div class="item">
          <div class="item-info">
            <div class="item-name">${it.n}</div>
            ${it.d?`<div class="item-desc">${it.d}</div>`:''}
            <div class="item-price">Simple ${fmt(it.ps)} · Extra ${fmt(it.pe)}</div>
          </div>
          <div class="variant-row">
            ${qS ? `<div class="qty-stepper"><button class="dec" data-id="${idS}">−</button><span>${qS}</span><button class="inc" data-id="${idS}">+</button></div>` : `<button class="add-btn" data-id="${idS}">+ Simple</button>`}
            ${qE ? `<div class="qty-stepper"><button class="dec" data-id="${idE}">−</button><span>${qE}</span><button class="inc" data-id="${idE}">+</button></div>` : `<button class="add-btn" data-id="${idE}">+ Extra</button>`}
          </div>
        </div>`;
      } else {
        const id = `${ci}-${si}-${ii}`;
        html += itemRow(id, it.n, it.d, it.p);
      }
    });
  });
  main.innerHTML = html;
  main.querySelectorAll('.add-btn, .inc').forEach(b=>b.onclick=()=>{ addItem(b.dataset.id); renderCategoria(ci); });
  main.querySelectorAll('.dec').forEach(b=>b.onclick=()=>{ removeItem(b.dataset.id); renderCategoria(ci); });
}

function addItem(id){ cart[id] = (cart[id]||0)+1; updateCartBar(); }
function removeItem(id){ if(!cart[id]) return; cart[id]--; if(cart[id]<=0) delete cart[id]; updateCartBar(); }

function cartTotal(){ return Object.entries(cart).reduce((s,[id,q])=> s + LOOKUP[id].precio*q, 0); }
function cartCount(){ return Object.values(cart).reduce((a,b)=>a+b,0); }

function updateCartBar(){
  const bar = document.getElementById('cartBar');
  const c = cartCount();
  if(c>0){ bar.classList.add('show'); } else { bar.classList.remove('show'); }
  document.getElementById('cartCount').textContent = c + (c===1?' item':' items');
  document.getElementById('cartTotal').textContent = fmt(cartTotal());
}

document.getElementById('cartBar').onclick = openCart;
function openCart(){
  const lines = document.getElementById('cartLines');
  if(cartCount()===0){ lines.innerHTML = '<div class="empty-note">Todavía no agregaste nada</div>'; }
  else{
    lines.innerHTML = Object.entries(cart).map(([id,q])=>{
      const m = LOOKUP[id];
      return `<div class="cart-line"><span class="nm">${q}× ${m.nombre}</span><span class="sub">${fmt(m.precio*q)}</span></div>`;
    }).join('');
  }
  document.getElementById('cartTotal2').textContent = fmt(cartTotal());
  document.getElementById('sendBtn').disabled = cartCount()===0;
  document.getElementById('cartOverlay').classList.add('show');
}
document.getElementById('closeCart').onclick = ()=> document.getElementById('cartOverlay').classList.remove('show');

document.getElementById('sendBtn').onclick = ()=>{
  if(cartCount()===0) return;
  const items = Object.entries(cart).map(([id,q])=>{
    const m = LOOKUP[id];
    return {nombre:m.nombre, precio:m.precio, cant:q};
  });
  const pedido = { id:'P'+Date.now(), mesa, cliente, items, total:cartTotal(), estado:'nuevo', hora:Date.now(), origen:'cliente' };
  const pedidos = JSON.parse(localStorage.getItem(SK('pedidos'))||'[]');
  pedidos.push(pedido);
  localStorage.setItem(SK('pedidos'), JSON.stringify(pedidos));
  localStorage.setItem(SK('ping'), Date.now().toString());

  cart = {}; updateCartBar();
  document.getElementById('cartOverlay').classList.remove('show');
  showToast('Pedido enviado a mesa ' + mesa + ' ✓');
  showStatusScreen();
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

function showStatusScreen(){
  document.getElementById('menuView').style.display='none';
  document.getElementById('statusView').style.display='block';
  renderStatus();
}

function renderStatus(){
  const pedidos = JSON.parse(localStorage.getItem(SK('pedidos'))||'[]').filter(p=>p.mesa===mesa);
  const view = document.getElementById('statusView');
  if(pedidos.length===0){ view.style.display='none'; document.getElementById('menuView').style.display='block'; return; }
  const totalMesa = pedidos.reduce((s,p)=>s+p.total,0);
  view.innerHTML = pedidos.slice().reverse().map(p=>{
    const steps = ['nuevo','preparando','listo'];
    const idx = steps.indexOf(p.estado);
    const labels = ['Recibido','Preparando','Listo'];
    return `<div class="ticket" style="margin-bottom:14px;">
      <h2>Pedido mesa ${p.mesa}</h2>
      <div style="font-size:.8rem;color:var(--tinta-dim);">${p.cliente?('A nombre de '+p.cliente+' · '):''}${new Date(p.hora).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})} · ${fmt(p.total)}</div>
      <div class="steps">
        ${labels.map((l,i)=>`<div class="step ${i<idx?'done':''} ${i===idx?'active':''}"><div class="step-line"></div><div class="dot">${i<idx?'✓':i+1}</div><div class="lbl">${l}</div></div>`).join('')}
      </div>
      <div style="font-size:.85rem;">${p.items.map(it=>`${it.cant}× ${it.nombre}`).join(' · ')}</div>
    </div>`;
  }).join('') + `
    <div class="ticket" style="background:var(--alerta); color:var(--papel); text-align:center;">
      <div style="font-family:'Playball',cursive; font-weight:400; font-size:1.5rem;">Total acumulado en tu mesa</div>
      <div style="font-weight:700; font-size:1.6rem;">${fmt(totalMesa)}</div>
      <div style="font-size:.75rem; opacity:.85; margin-top:4px;">El pago se realiza en caja</div>
    </div>
    <a class="back-link" href="#" id="addMoreBtn">+ Agregar otro pedido a la mesa</a>`;
  document.getElementById('addMoreBtn').onclick = (e)=>{
    e.preventDefault();
    document.getElementById('statusView').style.display='none';
    document.getElementById('menuView').style.display='block';
  };
}
function renderStatusIfPending(){
  const pedidos = JSON.parse(localStorage.getItem(SK('pedidos'))||'[]').filter(p=>p.mesa===mesa);
  if(pedidos.length>0) showStatusScreen();
}

// ---- llamar al mozo ----
document.getElementById('mozoFab').onclick = ()=> document.getElementById('mozoOverlay').classList.add('show');
document.getElementById('closeMozo').onclick = ()=> document.getElementById('mozoOverlay').classList.remove('show');
document.querySelectorAll('.motivo-btn').forEach(b=>{
  b.onclick = ()=>{
    const llamados = JSON.parse(localStorage.getItem(SK('llamados'))||'[]');
    llamados.push({id:'L'+Date.now(), mesa, motivo:b.dataset.m, hora:Date.now(), atendido:false});
    localStorage.setItem(SK('llamados'), JSON.stringify(llamados));
    localStorage.setItem(SK('ping'), Date.now().toString());
    document.getElementById('mozoOverlay').classList.remove('show');
    showToast('Avisamos al mozo 🖐️');
  };
});

// ---- sync en vivo (multi-pestaña) ----
window.addEventListener('storage', (e)=>{
  if(e.key===SK('pedidos') || e.key===SK('ping')){ if(document.getElementById('statusView').style.display!=='none') renderStatus(); }
});
setInterval(()=>{ if(document.getElementById('statusView').style.display!=='none') renderStatus(); }, 1500);

renderCats();
renderCategoria(0);
updateCartBar();
renderStatusIfPending();
</script>
</body>
</html>
