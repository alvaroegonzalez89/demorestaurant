<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playball&family=Poppins:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16201A; --bg2:#1E2A22; --lineas:#2E3D32;
    --texto:#F4F1E4; --texto-dim:#94A192;
    --papel:#F7F1E1; --papel2:#EFE6CE; --tinta:#2B2118; --tinta-dim:#6B6152;
    --acento:#D9A441; --acento-o:#B8842E; --alerta:#8A3636; --alerta-o:#6E2828; --exito:#5F8A66;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--texto); min-height:100vh;}
  header{display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--lineas);
    position:sticky; top:0; background:var(--bg); z-index:20;}
  .brand{font-family:'Playball',cursive; font-size:1.9rem; font-weight:400; color:var(--acento);}
  .brand small{display:block; font-family:'DM Sans'; font-size:.65rem; letter-spacing:.08em; color:var(--texto-dim); text-transform:uppercase;}
  .manual-btn{background:var(--acento); color:var(--tinta); border:none; padding:11px 18px; border-radius:999px; font-weight:700; cursor:pointer; font-size:.85rem;}

  .alerts{padding:0 22px; margin-top:14px;}
  .alert-card{background:var(--alerta); color:var(--papel); border-radius:12px; padding:12px 16px; display:flex;
    justify-content:space-between; align-items:center; margin-bottom:8px; animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(138,54,54,.5);} 50%{box-shadow:0 0 0 8px rgba(138,54,54,0);}}
  .alert-left{display:flex; flex-direction:column;}
  .alert-mesa{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1rem;}
  .alert-motivo{font-size:.82rem; opacity:.9;}
  .alert-time{font-size:.7rem; opacity:.7; margin-top:2px;}
  .atendido-btn{background:var(--papel); color:var(--alerta-o); border:none; padding:8px 14px; border-radius:999px; font-weight:700; font-size:.78rem; cursor:pointer;}

  .board{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; padding:20px 22px 40px;}
  @media (max-width:880px){ .board{grid-template-columns:1fr;} }
  .col h2{font-family:'Playball',cursive; font-weight:400; font-size:1.5rem; margin:0 0 12px; display:flex; align-items:center; gap:8px;}
  .col.nuevo h2{color:var(--acento);}
  .col.preparando h2{color:#E8C77A;}
  .col.listo h2{color:var(--exito);}
  .col-count{font-family:'JetBrains Mono',monospace; font-size:.75rem; background:var(--bg2); padding:2px 9px; border-radius:999px; color:var(--texto-dim);}

  .ticket{background:var(--papel); color:var(--tinta); border-radius:4px 4px 12px 12px; padding:16px; margin-bottom:14px;
    box-shadow:0 8px 18px rgba(0,0,0,.3); position:relative; cursor:pointer; border-top:3px dashed var(--alerta);}
  .ticket::before{content:''; position:absolute; top:-6px; left:16px; width:12px; height:12px; background:var(--alerta); border-radius:50%; box-shadow:0 2px 4px rgba(0,0,0,.3);}
  .ticket-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .ticket-mesa{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.1rem; color:var(--alerta-o);}
  .ticket-time{font-size:.72rem; color:var(--tinta-dim);}
  .ticket-origen{font-size:.65rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--tinta-dim); margin-bottom:6px;}
  .ticket-items{font-size:.87rem; line-height:1.5; margin-bottom:8px;}
  .ticket-total{font-weight:700; text-align:right; font-size:.95rem; border-top:1px dashed var(--papel2); padding-top:6px;}
  .ticket-hint{font-size:.68rem; color:var(--tinta-dim); text-align:center; margin-top:8px;}
  .empty-col{color:var(--texto-dim); font-size:.85rem; padding:20px 0; text-align:center; border:1px dashed var(--lineas); border-radius:12px;}

  .overlay{position:fixed; inset:0; background:rgba(10,14,11,.65); display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:var(--papel); color:var(--tinta); border-radius:16px; padding:22px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; position:relative;}
  .modal h3{font-family:'Playball',cursive; font-weight:400; font-size:1.8rem; color:var(--alerta-o); margin:0 0 14px;}
  .close-x{position:absolute; top:16px; right:18px; background:none; border:none; font-size:1.3rem; color:var(--tinta-dim); cursor:pointer;}
  .field-label{font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--tinta-dim); margin:14px 0 6px;}
  .mesa-input{width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--papel2); font-size:1rem; font-family:'JetBrains Mono',monospace;}
  .cat-mini{display:flex; gap:6px; overflow-x:auto; margin:4px 0 10px;}
  .cat-mini button{flex:0 0 auto; padding:7px 13px; border-radius:999px; border:1px solid var(--papel2); background:#fff; font-size:.76rem; font-weight:600; cursor:pointer;}
  .cat-mini button.active{background:var(--acento); border-color:var(--acento);}
  .mini-sec-title{font-weight:700; font-size:.8rem; color:var(--alerta-o); text-transform:uppercase; letter-spacing:.03em; margin:14px 0 4px;}
  .mini-item{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--papel2); font-size:.85rem; gap:8px;}
  .mini-item .nm{flex:1;}
  .mini-item button{background:var(--papel2); border:none; width:26px; height:26px; border-radius:50%; font-weight:700; cursor:pointer; flex:0 0 auto;}
  .manual-cart{margin-top:14px; background:var(--papel2); border-radius:10px; padding:10px 14px; font-size:.85rem;}
  .confirm-btn{width:100%; background:var(--alerta); color:var(--papel); border:none; padding:14px; border-radius:999px; font-weight:700; margin-top:14px; cursor:pointer;}
  .confirm-btn:disabled{opacity:.4;}
</style>
</head>

<header>
  <div class="brand" id="brandWordmark"></div>

  <div class="col preparando"><h2>En preparación <span class="col-count" id="cPrep">0</span></h2><div id="colPrep"></div></div>
  <div class="col listo"><h2>Listo <span class="col-count" id="cListo">0</span></h2><div id="colListo"></div></div>
</div>

<div class="overlay" id="manualOverlay">
  <div class="modal">
    <button class="close-x" id="closeManual">✕</button>

(function aplicarTema(){
  document.title = CONFIG.tituloPagina;
  document.getElementById('brandWordmark').innerHTML = `${CONFIG.marca.texto}<small>${CONFIG.marca.texto2}</small>`;
})();

const MENU = CONFIG.menu;
const CATS = CONFIG.categorias;
const SK = k => 'pideya_'+CONFIG.storageKey+'_'+k;

function fmt(n){ return '$' + n.toLocaleString('es-AR'); }
function tAgo(ts){
  const min = Math.floor((Date.now()-ts)/60000);
  if(min<1) return 'recién';
  if(min===1) return 'hace 1 min';
  return 'hace '+min+' min';
}

// mapa id -> {nombre, precio}
function buildLookup(){
  const map = {};
  MENU.forEach((catObj,ci)=>{
    catObj.secciones.forEach((sec,si)=>{
      sec.items.forEach((it,ii)=>{ map[`${ci}-${si}-${ii}`] = {nombre: it.n, precio: it.p}; });
    });
  });
  return map;
}
const LOOKUP = buildLookup();

function getPedidos(){ return JSON.parse(localStorage.getItem(SK('pedidos'))||'[]'); }
function setPedidos(p){ localStorage.setItem(SK('pedidos'), JSON.stringify(p)); localStorage.setItem(SK('ping'), Date.now().toString()); }
function getLlamados(){ return JSON.parse(localStorage.getItem(SK('llamados'))||'[]'); }
function setLlamados(l){ localStorage.setItem(SK('llamados'), JSON.stringify(l)); localStorage.setItem(SK('ping'), Date.now().toString()); }

function renderAlerts(){
  const llamados = getLlamados().filter(l=>!l.atendido);
  const box = document.getElementById('alerts');
  box.innerHTML = llamados.map(l=>`
    <div class="alert-card">
      <div class="alert-left">
        <span class="alert-mesa">MESA ${l.mesa} 🖐️</span>
        <span class="alert-motivo">${l.motivo}</span>
        <span class="alert-time">${tAgo(l.hora)}</span>
      </div>
      <button class="atendido-btn" data-id="${l.id}">Atendido</button>
    </div>`).join('');
  box.querySelectorAll('.atendido-btn').forEach(b=>{
    b.onclick = ()=>{
      const ll = getLlamados();
      const item = ll.find(x=>x.id===b.dataset.id);
      if(item) item.atendido = true;
      setLlamados(ll);
      renderAlerts();
    };
  });
}

function ticketHTML(p){
  return `<div class="ticket" data-id="${p.id}">
    <div class="ticket-top"><span class="ticket-mesa">MESA ${p.mesa}</span><span class="ticket-time">${tAgo(p.hora)}</span></div>
    <div class="ticket-origen">${p.origen==='mozo' ? 'Cargado por mozo' : 'Pedido por el cliente'}</div>
    <div class="ticket-items">${p.items.map(it=>`${it.cant}× ${it.nombre}`).join('<br>')}</div>
    <div class="ticket-total">${fmt(p.total)}</div>
    <div class="ticket-hint">Tocar para avanzar estado →</div>
  </div>`;
}

function renderBoard(){
  const pedidos = getPedidos().slice().sort((a,b)=>b.hora-a.hora);
  const nuevo = pedidos.filter(p=>p.estado==='nuevo');
  const prep = pedidos.filter(p=>p.estado==='preparando');
  const listo = pedidos.filter(p=>p.estado==='listo');
  document.getElementById('cNuevo').textContent = nuevo.length;
  document.getElementById('cPrep').textContent = prep.length;
  document.getElementById('cListo').textContent = listo.length;
  document.getElementById('colNuevo').innerHTML = nuevo.length? nuevo.map(ticketHTML).join('') : '<div class="empty-col">Sin pedidos nuevos</div>';
  document.getElementById('colPrep').innerHTML = prep.length? prep.map(ticketHTML).join('') : '<div class="empty-col">Nada en preparación</div>';
  document.getElementById('colListo').innerHTML = listo.length? listo.map(ticketHTML).join('') : '<div class="empty-col">Nada listo aún</div>';

  document.querySelectorAll('.ticket').forEach(t=>{
    t.onclick = ()=>{
      const pedidos = getPedidos();
      const p = pedidos.find(x=>x.id===t.dataset.id);
      if(!p) return;
      if(p.estado==='nuevo') p.estado='preparando';
      else if(p.estado==='preparando') p.estado='listo';
      else if(p.estado==='listo'){ const idx = pedidos.indexOf(p); pedidos.splice(idx,1); }
      setPedidos(pedidos);
      renderBoard();
    };
  });
}

// ---- carga manual ----
let manualCart = {};
let manualCatIdx = 0;
document.getElementById('openManual').onclick = ()=>{ manualCart={}; manualCatIdx=0; document.getElementById('manualMesa').value=''; renderManualCatBtns(); renderManualItems(); updateManualSummary(); document.getElementById('manualOverlay').classList.add('show'); };
document.getElementById('closeManual').onclick = ()=> document.getElementById('manualOverlay').classList.remove('show');

function renderManualCatBtns(){
  const box = document.getElementById('miniCats');
  box.innerHTML = CATS.map((c,i)=>`<button class="${i===manualCatIdx?'active':''}" data-i="${i}">${c}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{ manualCatIdx = parseInt(b.dataset.i); box.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderManualItems(); };
  });
}
function renderManualItems(){
  const box = document.getElementById('miniItems');
  const catObj = MENU[manualCatIdx];
  if(!catObj.secciones.length){ box.innerHTML = '<div style="padding:14px 0;color:var(--tinta-dim);font-size:.85rem;">Esta categoría es solo informativa (sabores de helado) — no tiene precio propio para cargar.</div>'; return; }
  let html = '';
  catObj.secciones.forEach((sec,si)=>{
    html += `<div class="mini-sec-title">${sec.titulo}</div>`;
    sec.items.forEach((it,ii)=>{
      const id = `${manualCatIdx}-${si}-${ii}`;
      html += `<div class="mini-item">
        <span class="nm">${it.n} — ${fmt(it.p)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <button data-id="${id}" data-op="-">−</button>
          <span id="qty-${id}">${manualCart[id]||0}</span>
          <button data-id="${id}" data-op="+">+</button>
        </span>
      </div>`;
    });
  });
  box.innerHTML = html;
  box.querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{
      const id=b.dataset.id;
      if(b.dataset.op==='+') manualCart[id]=(manualCart[id]||0)+1;
      else { manualCart[id]=(manualCart[id]||0)-1; if(manualCart[id]<=0) delete manualCart[id]; }
      document.getElementById('qty-'+id).textContent = manualCart[id]||0;
      updateManualSummary();
    };
  });
}
function updateManualSummary(){
  const entries = Object.entries(manualCart);
  const summary = document.getElementById('manualCartSummary');
  const total = entries.reduce((s,[id,q])=> s + LOOKUP[id].precio*q, 0);
  summary.textContent = entries.length? entries.map(([id,q])=>`${q}× ${LOOKUP[id].nombre}`).join(' · ') + ` — ${fmt(total)}` : 'Sin productos agregados';
  document.getElementById('confirmManual').disabled = !(entries.length && document.getElementById('manualMesa').value.trim());
}
document.getElementById('manualMesa').addEventListener('input', updateManualSummary);

document.getElementById('confirmManual').onclick = ()=>{
  const mesa = document.getElementById('manualMesa').value.trim();
  const entries = Object.entries(manualCart);
  if(!mesa || !entries.length) return;
  const items = entries.map(([id,q])=>{ const m=LOOKUP[id]; return {nombre:m.nombre, precio:m.precio, cant:q}; });
  const total = items.reduce((s,it)=>s+it.precio*it.cant,0);
  const pedidos = getPedidos();
  pedidos.push({id:'P'+Date.now(), mesa, items, total, estado:'nuevo', hora:Date.now(), origen:'mozo'});
  setPedidos(pedidos);
  document.getElementById('manualOverlay').classList.remove('show');
  renderBoard();
};

window.addEventListener('storage', (e)=>{
  if([SK('pedidos'),SK('llamados'),SK('ping')].includes(e.key)){ renderBoard(); renderAlerts(); }
});
setInterval(()=>{ renderBoard(); renderAlerts(); }, 4000);

renderBoard();
renderAlerts();
</script>
