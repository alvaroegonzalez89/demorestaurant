<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PideYa · Mostrador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --chalk-bg:#16201A; --chalk-bg-2:#1E2A22; --chalk-line:#2E3D32;
    --chalk-text:#F4F1E4; --chalk-text-dim:#94A192;
    --paper:#F7F1E1; --paper-2:#EFE6CE; --ink:#2B2118; --ink-dim:#6B6152;
    --amber:#D9A441; --amber-dark:#B8842E; --wine:#8A3636; --wine-dark:#6E2828; --sage:#5F8A66;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'DM Sans',sans-serif; background:var(--chalk-bg); color:var(--chalk-text); min-height:100vh;}
  header{display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--chalk-line);
    position:sticky; top:0; background:var(--chalk-bg); z-index:20;}
  .brand{font-family:'Caveat',cursive; font-size:1.9rem; color:var(--amber); font-weight:700;}
  .brand span{color:var(--chalk-text);}
  .brand small{display:block; font-family:'DM Sans'; font-size:.65rem; letter-spacing:.08em; color:var(--chalk-text-dim); text-transform:uppercase;}
  .manual-btn{background:var(--amber); color:var(--ink); border:none; padding:11px 18px; border-radius:999px; font-weight:700; cursor:pointer; font-size:.85rem;}

  .alerts{padding:0 22px; margin-top:14px;}
  .alert-card{background:var(--wine); color:var(--paper); border-radius:12px; padding:12px 16px; display:flex;
    justify-content:space-between; align-items:center; margin-bottom:8px; animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(138,54,54,.5);} 50%{box-shadow:0 0 0 8px rgba(138,54,54,0);}}
  .alert-left{display:flex; flex-direction:column;}
  .alert-mesa{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1rem;}
  .alert-motivo{font-size:.82rem; opacity:.9;}
  .alert-time{font-size:.7rem; opacity:.7; margin-top:2px;}
  .atendido-btn{background:var(--paper); color:var(--wine-dark); border:none; padding:8px 14px; border-radius:999px; font-weight:700; font-size:.78rem; cursor:pointer;}

  .board{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; padding:20px 22px 40px;}
  @media (max-width:880px){ .board{grid-template-columns:1fr;} }
  .col h2{font-family:'Caveat',cursive; font-size:1.5rem; margin:0 0 12px; display:flex; align-items:center; gap:8px;}
  .col.nuevo h2{color:var(--amber);}
  .col.preparando h2{color:#E8C77A;}
  .col.listo h2{color:var(--sage);}
  .col-count{font-family:'JetBrains Mono',monospace; font-size:.75rem; background:var(--chalk-bg-2); padding:2px 9px; border-radius:999px; color:var(--chalk-text-dim);}

  .ticket{background:var(--paper); color:var(--ink); border-radius:4px 4px 12px 12px; padding:16px; margin-bottom:14px;
    box-shadow:0 8px 18px rgba(0,0,0,.3); position:relative; cursor:pointer; border-top:3px dashed var(--wine);}
  .ticket::before{content:''; position:absolute; top:-6px; left:16px; width:12px; height:12px; background:var(--wine); border-radius:50%; box-shadow:0 2px 4px rgba(0,0,0,.3);}
  .ticket-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .ticket-mesa{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.1rem; color:var(--wine-dark);}
  .ticket-time{font-size:.72rem; color:var(--ink-dim);}
  .ticket-origen{font-size:.65rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:6px;}
  .ticket-items{font-size:.87rem; line-height:1.5; margin-bottom:8px;}
  .ticket-total{font-family:'JetBrains Mono',monospace; font-weight:700; text-align:right; font-size:.95rem; border-top:1px dashed var(--paper-2); padding-top:6px;}
  .ticket-hint{font-size:.68rem; color:var(--ink-dim); text-align:center; margin-top:8px;}
  .empty-col{color:var(--chalk-text-dim); font-size:.85rem; padding:20px 0; text-align:center; border:1px dashed var(--chalk-line); border-radius:12px;}

  .overlay{position:fixed; inset:0; background:rgba(10,14,11,.65); display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:var(--paper); color:var(--ink); border-radius:16px; padding:22px; width:100%; max-width:520px; max-height:88vh; overflow-y:auto; position:relative;}
  .modal h3{font-family:'Caveat',cursive; font-size:1.7rem; color:var(--wine-dark); margin:0 0 14px;}
  .close-x{position:absolute; top:16px; right:18px; background:none; border:none; font-size:1.3rem; color:var(--ink-dim); cursor:pointer;}
  .field-label{font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-dim); margin:14px 0 6px;}
  .mesa-input{width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--paper-2); font-size:1rem; font-family:'JetBrains Mono',monospace;}
  .cat-mini{display:flex; gap:6px; overflow-x:auto; margin:4px 0 10px;}
  .cat-mini button{flex:0 0 auto; padding:7px 13px; border-radius:999px; border:1px solid var(--paper-2); background:#fff; font-size:.78rem; font-weight:600; cursor:pointer;}
  .cat-mini button.active{background:var(--amber); border-color:var(--amber);}
  .mini-item{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--paper-2); font-size:.88rem;}
  .mini-item button{background:var(--paper-2); border:none; width:26px; height:26px; border-radius:50%; font-weight:700; cursor:pointer;}
  .manual-cart{margin-top:14px; background:var(--paper-2); border-radius:10px; padding:10px 14px; font-size:.85rem;}
  .confirm-btn{width:100%; background:var(--wine); color:var(--paper); border:none; padding:14px; border-radius:999px; font-weight:700; margin-top:14px; cursor:pointer;}
  .confirm-btn:disabled{opacity:.4;}
</style>
</head>
<body>

<header>
  <div class="brand"><span>Pide</span>Ya<small>Mostrador</small></div>
  <button class="manual-btn" id="openManual">+ Cargar pedido manual</button>
</header>

<div class="alerts" id="alerts"></div>

<div class="board">
  <div class="col nuevo"><h2>Nuevo <span class="col-count" id="cNuevo">0</span></h2><div id="colNuevo"></div></div>
  <div class="col preparando"><h2>En preparación <span class="col-count" id="cPrep">0</span></h2><div id="colPrep"></div></div>
  <div class="col listo"><h2>Listo <span class="col-count" id="cListo">0</span></h2><div id="colListo"></div></div>
</div>

<div class="overlay" id="manualOverlay">
  <div class="modal">
    <button class="close-x" id="closeManual">✕</button>
    <h3>Cargar pedido manual</h3>
    <div class="field-label">Mesa</div>
    <input class="mesa-input" id="manualMesa" placeholder="N° de mesa" inputmode="numeric">
    <div class="field-label">Productos</div>
    <div class="cat-mini" id="miniCats"></div>
    <div id="miniItems"></div>
    <div class="manual-cart" id="manualCartSummary">Sin productos agregados</div>
    <button class="confirm-btn" id="confirmManual" disabled>Enviar a cocina</button>
  </div>
</div>

<script>
const MENU = [
  {id:'e1',cat:'Entradas',nombre:'Provoleta',precio:4500},
  {id:'e2',cat:'Entradas',nombre:'Empanadas de carne (x3)',precio:3800},
  {id:'e3',cat:'Entradas',nombre:'Tabla de fiambres',precio:6200},
  {id:'e4',cat:'Entradas',nombre:'Rabas',precio:5200},
  {id:'p1',cat:'Principales',nombre:'Bife de chorizo',precio:9800},
  {id:'p2',cat:'Principales',nombre:'Milanesa napolitana',precio:8200},
  {id:'p3',cat:'Principales',nombre:'Ensalada Caesar',precio:6500},
  {id:'p4',cat:'Principales',nombre:'Sorrentinos caseros',precio:7400},
  {id:'b1',cat:'Bebidas',nombre:'Copa de Malbec',precio:3200},
  {id:'b2',cat:'Bebidas',nombre:'Cerveza artesanal IPA',precio:3500},
  {id:'b3',cat:'Bebidas',nombre:'Agua mineral',precio:1500},
  {id:'b4',cat:'Bebidas',nombre:'Limonada casera',precio:2200},
  {id:'d1',cat:'Postres',nombre:'Flan casero',precio:3000},
  {id:'d2',cat:'Postres',nombre:'Brownie con helado',precio:3800},
  {id:'d3',cat:'Postres',nombre:'Fruta de estación',precio:2500},
];
const CATS = ['Entradas','Principales','Bebidas','Postres'];
function fmt(n){ return '$' + n.toLocaleString('es-AR'); }
function tAgo(ts){
  const min = Math.floor((Date.now()-ts)/60000);
  if(min<1) return 'recién';
  if(min===1) return 'hace 1 min';
  return 'hace '+min+' min';
}

function getPedidos(){ return JSON.parse(localStorage.getItem('pideya_pedidos')||'[]'); }
function setPedidos(p){ localStorage.setItem('pideya_pedidos', JSON.stringify(p)); localStorage.setItem('pideya_ping', Date.now().toString()); }
function getLlamados(){ return JSON.parse(localStorage.getItem('pideya_llamados')||'[]'); }
function setLlamados(l){ localStorage.setItem('pideya_llamados', JSON.stringify(l)); localStorage.setItem('pideya_ping', Date.now().toString()); }

function renderAlerts(){
  const llamados = getLlamados().filter(l=>!l.atendido);
  const box = document.getElementById('alerts');
  box.innerHTML = llamados.map(l=>`
    <div class="alert-card">
      <div class="alert-left">
        <span class="alert-mesa">MESA ${l.mesa} 🖐️</span>
        <span class="alert-motivo">${l.motivo}</span>
        <span class="alert-time">${tAgo(l.hora)}</span>
      </div>
      <button class="atendido-btn" data-id="${l.id}">Atendido</button>
    </div>`).join('');
  box.querySelectorAll('.atendido-btn').forEach(b=>{
    b.onclick = ()=>{
      const ll = getLlamados();
      const item = ll.find(x=>x.id===b.dataset.id);
      if(item) item.atendido = true;
      setLlamados(ll);
      renderAlerts();
    };
  });
}

function ticketHTML(p){
  return `<div class="ticket" data-id="${p.id}">
    <div class="ticket-top"><span class="ticket-mesa">MESA ${p.mesa}</span><span class="ticket-time">${tAgo(p.hora)}</span></div>
    <div class="ticket-origen">${p.origen==='mozo' ? 'Cargado por mozo' : 'Pedido por el cliente'}</div>
    <div class="ticket-items">${p.items.map(it=>`${it.cant}× ${it.nombre}`).join('<br>')}</div>
    <div class="ticket-total">${fmt(p.total)}</div>
    <div class="ticket-hint">Tocar para avanzar estado →</div>
  </div>`;
}

function renderBoard(){
  const pedidos = getPedidos().slice().sort((a,b)=>b.hora-a.hora);
  const nuevo = pedidos.filter(p=>p.estado==='nuevo');
  const prep = pedidos.filter(p=>p.estado==='preparando');
  const listo = pedidos.filter(p=>p.estado==='listo');
  document.getElementById('cNuevo').textContent = nuevo.length;
  document.getElementById('cPrep').textContent = prep.length;
  document.getElementById('cListo').textContent = listo.length;
  document.getElementById('colNuevo').innerHTML = nuevo.length? nuevo.map(ticketHTML).join('') : '<div class="empty-col">Sin pedidos nuevos</div>';
  document.getElementById('colPrep').innerHTML = prep.length? prep.map(ticketHTML).join('') : '<div class="empty-col">Nada en preparación</div>';
  document.getElementById('colListo').innerHTML = listo.length? listo.map(ticketHTML).join('') : '<div class="empty-col">Nada listo aún</div>';

  document.querySelectorAll('.ticket').forEach(t=>{
    t.onclick = ()=>{
      const pedidos = getPedidos();
      const p = pedidos.find(x=>x.id===t.dataset.id);
      if(!p) return;
      if(p.estado==='nuevo') p.estado='preparando';
      else if(p.estado==='preparando') p.estado='listo';
      else if(p.estado==='listo'){ 
        // entregado -> lo saca del tablero
        const idx = pedidos.indexOf(p);
        pedidos.splice(idx,1);
      }
      setPedidos(pedidos);
      renderBoard();
    };
  });
}

// ---- carga manual ----
let manualCart = {};
document.getElementById('openManual').onclick = ()=>{ manualCart={}; document.getElementById('manualMesa').value=''; renderManualCatBtns(); renderManualItems(CATS[0]); updateManualSummary(); document.getElementById('manualOverlay').classList.add('show'); };
document.getElementById('closeManual').onclick = ()=> document.getElementById('manualOverlay').classList.remove('show');

function renderManualCatBtns(){
  const box = document.getElementById('miniCats');
  box.innerHTML = CATS.map((c,i)=>`<button class="${i===0?'active':''}" data-c="${c}">${c}</button>`).join('');
  box.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{ box.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderManualItems(b.dataset.c); };
  });
}
function renderManualItems(cat){
  const box = document.getElementById('miniItems');
  box.innerHTML = MENU.filter(m=>m.cat===cat).map(m=>`
    <div class="mini-item">
      <span>${m.nombre} — ${fmt(m.precio)}</span>
      <span style="display:flex;align-items:center;gap:8px;">
        <button data-id="${m.id}" data-op="-">−</button>
        <span id="qty-${m.id}">${manualCart[m.id]||0}</span>
        <button data-id="${m.id}" data-op="+">+</button>
      </span>
    </div>`).join('');
  box.querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{
      const id=b.dataset.id;
      if(b.dataset.op==='+') manualCart[id]=(manualCart[id]||0)+1;
      else { manualCart[id]=(manualCart[id]||0)-1; if(manualCart[id]<=0) delete manualCart[id]; }
      document.getElementById('qty-'+id).textContent = manualCart[id]||0;
      updateManualSummary();
    };
  });
}
function updateManualSummary(){
  const entries = Object.entries(manualCart);
  const summary = document.getElementById('manualCartSummary');
  const total = entries.reduce((s,[id,q])=> s + MENU.find(m=>m.id===id).precio*q, 0);
  summary.textContent = entries.length? entries.map(([id,q])=>`${q}× ${MENU.find(m=>m.id===id).nombre}`).join(' · ') + ` — ${fmt(total)}` : 'Sin productos agregados';
  document.getElementById('confirmManual').disabled = !(entries.length && document.getElementById('manualMesa').value.trim());
}
document.getElementById('manualMesa').addEventListener('input', updateManualSummary);

document.getElementById('confirmManual').onclick = ()=>{
  const mesa = document.getElementById('manualMesa').value.trim();
  const entries = Object.entries(manualCart);
  if(!mesa || !entries.length) return;
  const items = entries.map(([id,q])=>{ const m=MENU.find(x=>x.id===id); return {nombre:m.nombre, precio:m.precio, cant:q}; });
  const total = items.reduce((s,it)=>s+it.precio*it.cant,0);
  const pedidos = getPedidos();
  pedidos.push({id:'P'+Date.now(), mesa, items, total, estado:'nuevo', hora:Date.now(), origen:'mozo'});
  setPedidos(pedidos);
  document.getElementById('manualOverlay').classList.remove('show');
  renderBoard();
};

// ---- sync ----
window.addEventListener('storage', (e)=>{
  if(['pideya_pedidos','pideya_llamados','pideya_ping'].includes(e.key)){ renderBoard(); renderAlerts(); }
});
setInterval(()=>{ renderBoard(); renderAlerts(); }, 4000);

renderBoard();
renderAlerts();
</script>
</body>
</html>
